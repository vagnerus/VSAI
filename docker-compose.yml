version: '3.8'

services:
  nexus-ai:
    build: .
    container_name: nexus-ai
    restart: unless-stopped
    ports:
      - "${PORT:-3777}:3777"
    environment:
      NODE_ENV: production
      PORT: 3777
      # Preencha as variáveis abaixo ou use um arquivo .env
      GEMINI_API_KEY: ${GEMINI_API_KEY}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY}
      DEFAULT_PROVIDER: ${DEFAULT_PROVIDER:-gemini}
      GEMINI_MODEL: ${GEMINI_MODEL:-gemini-1.5-flash}
      ANTHROPIC_MODEL: ${ANTHROPIC_MODEL:-claude-sonnet-4-20250514}
      MAX_TOKENS: ${MAX_TOKENS:-8192}
      CORS_ORIGIN: ${CORS_ORIGIN:-*}
      USE_DATABASE: ${USE_DATABASE:-false}
      DATABASE_PATH: /app/data/nexus.db
      SESSION_STORAGE_PATH: /app/data/sessions
    volumes:
      - nexus_data:/app/data
      - nexus_logs:/app/logs
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3777/api/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s

volumes:
  nexus_data:
    driver: local
  nexus_logs:
    driver: local
