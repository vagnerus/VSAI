<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>VSAI - IA — Assistente Inteligente</title>
  <meta name="description" content="Assistente de IA avançado com Gemini. Faça perguntas, gere código, traduza textos e muito mais.">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg-primary: #f8fafc;
      --bg-secondary: #ffffff;
      --bg-card: #ffffff;
      --bg-user-msg: linear-gradient(135deg, #8b5cf6 0%, #6366f1 100%);
      --bg-ai-msg: #ffffff;
      --text-primary: #0f172a;
      --text-secondary: #475569;
      --accent: #8b5cf6;
      --accent-glow: rgba(139,92,246,0.15);
      --border: rgba(0,0,0,0.06);
      --radius: 20px;
      --radius-sm: 12px;
      --font: 'Outfit', 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
    }

    body {
      font-family: var(--font);
      background: var(--bg-primary);
      color: var(--text-primary);
      height: 100dvh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    /* ── Header ────────────────────────────────────────────── */
    .header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 14px 24px;
      background: var(--bg-secondary);
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }
    .header-brand {
      display: flex;
      align-items: center;
      gap: 12px;
    }
    .header-logo {
      width: 38px; height: 38px;
      background: var(--bg-user-msg);
      border-radius: 12px;
      display: flex; align-items: center; justify-content: center;
      font-size: 20px;
      box-shadow: 0 0 20px var(--accent-glow);
    }
    .header-name { font-weight: 800; font-size: 18px; letter-spacing: -0.5px; }
    .header-sub { font-size: 11px; color: var(--text-secondary); }
    .header-actions { display: flex; gap: 8px; }
    .btn-new {
      background: var(--accent);
      color: white; border: none;
      padding: 8px 16px; border-radius: 20px;
      font-size: 13px; font-weight: 600;
      cursor: pointer; transition: all 0.2s;
    }
    .btn-new:hover { transform: scale(1.05); box-shadow: 0 0 20px var(--accent-glow); }

    .model-badge {
      background: var(--bg-card);
      border: 1px solid var(--border);
      color: var(--text-secondary);
      padding: 6px 12px; border-radius: 20px;
      font-size: 11px; font-weight: 500;
    }

    /* ── Messages ──────────────────────────────────────────── */
    .messages {
      flex: 1;
      overflow-y: auto;
      padding: 24px;
      display: flex;
      flex-direction: column;
      gap: 16px;
      scroll-behavior: smooth;
    }
    .messages::-webkit-scrollbar { width: 6px; }
    .messages::-webkit-scrollbar-track { background: transparent; }
    .messages::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 3px; }

    .welcome {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      gap: 16px;
      animation: fadeIn 0.6s ease;
    }
    .welcome-icon {
      font-size: 52px;
      filter: drop-shadow(0 0 30px var(--accent-glow));
    }
    .welcome h2 { font-size: 28px; font-weight: 800; letter-spacing: -1px; }
    .welcome p { color: var(--text-secondary); font-size: 15px; max-width: 440px; line-height: 1.6; }

    .suggestions {
      display: flex; flex-wrap: wrap; gap: 8px;
      justify-content: center; margin-top: 8px;
    }
    .suggestion {
      background: var(--bg-card);
      border: 1px solid var(--border);
      color: var(--text-secondary);
      padding: 10px 16px; border-radius: 12px;
      font-size: 13px; cursor: pointer;
      transition: all 0.2s;
    }
    .suggestion:hover {
      border-color: var(--accent);
      color: var(--text-primary);
      background: var(--accent-glow);
    }

    .msg {
      max-width: 780px;
      width: 100%;
      margin: 0 auto;
      animation: slideUp 0.3s ease;
    }
    .msg-user .msg-bubble {
      background: var(--bg-user-msg);
      border-radius: var(--radius) var(--radius) 4px var(--radius);
      padding: 14px 20px;
      font-size: 14px; line-height: 1.65;
      color: #ffffff;
      box-shadow: 0 4px 24px rgba(139,92,246,0.1);
    }
    .msg-ai .msg-bubble {
      background: var(--bg-ai-msg);
      border: 1px solid var(--border);
      border-radius: 4px var(--radius) var(--radius) var(--radius);
      padding: 16px 20px;
      font-size: 14px; line-height: 1.75;
    }
    .msg-system .msg-bubble {
      background: rgba(239,68,68,0.1);
      border: 1px solid rgba(239,68,68,0.2);
      border-radius: var(--radius-sm);
      padding: 12px 16px;
      font-size: 13px; color: #fca5a5;
    }
    .msg-meta {
      font-size: 11px; color: var(--text-secondary);
      margin-top: 6px; display: flex; gap: 8px;
    }

    /* Markdown inside messages */
    .msg-bubble h1, .msg-bubble h2, .msg-bubble h3 { margin: 12px 0 6px; }
    .msg-bubble h1 { font-size: 18px; }
    .msg-bubble h2 { font-size: 16px; }
    .msg-bubble h3 { font-size: 14px; }
    .msg-bubble code {
      background: #f1f5f9;
      padding: 2px 6px; border-radius: 4px;
      font-size: 13px; font-family: 'Fira Code', monospace;
    }
    .msg-bubble pre {
      background: #f1f5f9;
      border: 1px solid var(--border);
      padding: 14px; border-radius: 8px;
      overflow-x: auto; margin: 10px 0;
    }
    .msg-bubble pre code { background: none; padding: 0; }
    .msg-bubble a { color: var(--accent); text-decoration: underline; }
    .msg-bubble ul, .msg-bubble ol { padding-left: 20px; margin: 8px 0; }
    .msg-bubble li { margin-bottom: 4px; }
    .msg-bubble blockquote {
      border-left: 3px solid var(--accent);
      padding-left: 12px; margin: 8px 0;
      color: var(--text-secondary); font-style: italic;
    }
    .msg-bubble strong { color: #d4bfff; }
    .msg-bubble hr { border: none; border-top: 1px solid var(--border); margin: 12px 0; }

    /* Streaming */
    .streaming-indicator {
      display: flex; align-items: center; gap: 10px;
      padding: 12px 20px; font-size: 13px;
      color: var(--text-secondary);
      max-width: 780px; margin: 0 auto;
    }
    .dot-pulse { display: flex; gap: 4px; }
    .dot-pulse span {
      width: 6px; height: 6px;
      border-radius: 50%;
      background: var(--accent);
      animation: pulse 1.2s infinite ease-in-out;
    }
    .dot-pulse span:nth-child(2) { animation-delay: 0.15s; }
    .dot-pulse span:nth-child(3) { animation-delay: 0.3s; }

    /* ── Input ─────────────────────────────────────────────── */
    .input-area {
      padding: 16px 24px 20px;
      background: var(--bg-secondary);
      border-top: 1px solid var(--border);
      flex-shrink: 0;
    }
    .input-wrapper {
      max-width: 780px;
      margin: 0 auto;
      display: flex;
      gap: 10px;
      align-items: flex-end;
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 8px 12px;
      transition: border-color 0.2s;
    }
    .input-wrapper:focus-within {
      border-color: var(--accent);
      box-shadow: 0 0 20px var(--accent-glow);
    }
    .input-wrapper textarea {
      flex: 1;
      background: transparent;
      border: none;
      color: var(--text-primary);
      font-family: var(--font);
      font-size: 14px;
      resize: none;
      outline: none;
      max-height: 150px;
      line-height: 1.5;
      padding: 6px 0;
    }
    .input-wrapper textarea::placeholder { color: var(--text-secondary); }
    .send-btn {
      width: 40px; height: 40px;
      border-radius: 12px;
      border: none;
      background: var(--accent);
      color: white;
      font-size: 18px;
      cursor: pointer;
      transition: all 0.2s;
      flex-shrink: 0;
      display: flex; align-items: center; justify-content: center;
    }
    .send-btn:hover { transform: scale(1.08); box-shadow: 0 0 16px var(--accent-glow); }
    .send-btn:disabled { opacity: 0.3; cursor: not-allowed; transform: none; }
    .send-btn.abort { background: #ef4444; }

    .input-footer {
      max-width: 780px;
      margin: 6px auto 0;
      font-size: 11px;
      color: var(--text-secondary);
      text-align: center;
    }

    /* Camera & Call Mode Styles */
    .camera-preview {
      position: relative;
      margin: 10px auto;
      max-width: 320px;
      border-radius: 12px;
      overflow: hidden;
      background: #000;
      display: none;
    }
    .camera-preview video { width: 100%; display: block; transform: scaleX(-1); }
    .camera-controls {
      position: absolute;
      bottom: 10px; left: 0; right: 0;
      display: flex; justify-content: center; gap: 8px;
    }
    .btn-icon {
      background: transparent; border: none;
      font-size: 20px; cursor: pointer; padding: 4px 8px;
      transition: transform 0.2s;
    }
    .btn-icon:hover { transform: scale(1.2); }
    .btn-icon.active { color: var(--accent); text-shadow: 0 0 10px var(--accent-glow); }
    .btn-icon.recording { color: #ef4444; animation: blink 1s infinite; }
    @keyframes blink { 50% { opacity: 0.5; } }
    
    .call-btn {
      background: var(--bg-card);
      border: 1px solid var(--border);
      padding: 6px 12px; border-radius: 20px;
      font-size: 11px; font-weight: 600; cursor: pointer;
      display: flex; align-items: center; gap: 4px;
    }
    .call-btn.active { background: var(--accent); color: white; border-color: var(--accent); }
    
    .image-preview {
      display: none;
      position: relative;
      width: 60px; height: 60px;
      margin-bottom: 8px;
    }
    .image-preview img { width: 100%; height: 100%; object-fit: cover; border-radius: 8px; border: 1px solid var(--border); }
    .image-preview .remove {
      position: absolute; top: -5px; right: -5px;
      background: #ef4444; color: white; border: none;
      border-radius: 50%; width: 18px; height: 18px;
      font-size: 12px; cursor: pointer;
    }

    /* ── Animations ────────────────────────────────────────── */
    @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    @keyframes slideUp { from { opacity: 0; transform: translateY(12px); } to { opacity: 1; transform: translateY(0); } }
    @keyframes pulse {
      0%, 80%, 100% { transform: scale(0.6); opacity: 0.4; }
      40% { transform: scale(1); opacity: 1; }
    }

    /* ── Responsive ────────────────────────────────────────── */
    @media (max-width: 600px) {
      .header { padding: 10px 16px; }
      .messages { padding: 16px; }
      .input-area { padding: 12px 16px 16px; }
      .suggestions { flex-direction: column; }
      .welcome h2 { font-size: 22px; }
    }
  </style>
</head>
<body>

  <!-- Header -->
  <div class="header">
    <div class="header-brand">
      <div class="header-logo">🧠</div>
      <div>
        <div class="header-name">VSAI - IA</div>
        <div class="header-sub">Assistente Inteligente</div>
      </div>
    </div>
    <div class="header-actions">
      <button class="call-btn" id="callBtn" onclick="toggleCallMode()">📞 Modo Chamada</button>
      <span class="model-badge" id="modelBadge">⚡ Gemini 2.5 Flash</span>
      <button class="btn-new" onclick="newChat()">+ Nova</button>
    </div>
  </div>

  <!-- Messages -->
  <div class="messages" id="messages">
    <div class="welcome" id="welcome">
      <div class="welcome-icon">🧠</div>
      <h2>Olá! Sou o VSAI - IA</h2>
      <p>Posso ajudar com perguntas, gerar código, traduzir textos, criar conteúdo, analisar dados e muito mais.</p>
      <div class="suggestions">
        <div class="suggestion" onclick="useSuggestion('Gere um código HTML de uma landing page moderna')">💻 Gerar código</div>
        <div class="suggestion" onclick="useSuggestion('Traduza este texto para inglês: Olá mundo')">🌍 Traduzir</div>
        <div class="suggestion" onclick="useSuggestion('Explique como funciona uma API REST')">📚 Explicar</div>
        <div class="suggestion" onclick="useSuggestion('Escreva um email profissional pedindo orçamento')">✉️ Escrever</div>
      </div>
    </div>
  </div>

  <!-- Input -->
  <div class="input-area">
    <div class="camera-preview" id="cameraPreview">
      <video id="video" autoPlay playsInline muted></video>
      <div class="camera-controls">
        <button class="btn-new" onclick="captureFrame()">📸 Foto</button>
        <button class="btn-new" style="background:#ef4444" onclick="toggleCamera()">✕</button>
      </div>
    </div>
    
    <div class="input-wrapper" style="flex-direction: column; align-items: flex-start;">
      <div class="image-preview" id="imagePreview">
        <img id="previewImg" src="">
        <button class="remove" onclick="removeImage()">×</button>
      </div>
      <div style="display: flex; width: 100%; align-items: flex-end; gap: 8px;">
        <button class="btn-icon" onclick="toggleCamera()" title="Câmera">📷</button>
        <button class="btn-icon" id="micBtn" onclick="toggleMic()" title="Voz">🎤</button>
        <textarea id="input" rows="1" placeholder="Digite sua mensagem..." onkeydown="handleKey(event)" oninput="autoResize(this)"></textarea>
        <button class="send-btn" id="sendBtn" onclick="send()" disabled>➤</button>
      </div>
    </div>
    <div class="input-footer">VSAI - IA pode cometer erros. Verifique informações importantes.</div>
  </div>

  <script>
    const API_BASE = '/api';
    let messages = [];
    let isStreaming = false;
    let abortController = null;
    let isCallMode = false;
    let isCameraActive = false;
    let imageAttachment = null;
    let isRecording = false;
    let voiceEnabled = false;

    const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
    const recognition = SpeechRecognition ? new SpeechRecognition() : null;
    if (recognition) {
      recognition.lang = 'pt-BR';
      recognition.onstart = () => { isRecording = true; document.getElementById('micBtn').classList.add('recording'); };
      recognition.onend = () => { isRecording = false; document.getElementById('micBtn').classList.remove('recording'); };
      recognition.onresult = (e) => {
        const text = e.results[0][0].transcript;
        if (isCallMode) {
          send(text);
        } else {
          $input.value += ' ' + text;
          $sendBtn.disabled = false;
        }
      };
    }

    const $messages = document.getElementById('messages');
    const $input = document.getElementById('input');
    const $sendBtn = document.getElementById('sendBtn');
    const $welcome = document.getElementById('welcome');

    $input.addEventListener('input', () => {
      $sendBtn.disabled = !$input.value.trim();
    });

    function autoResize(el) {
      el.style.height = 'auto';
      el.style.height = Math.min(el.scrollHeight, 150) + 'px';
    }

    function handleKey(e) {
      if (e.key === 'Enter' && !e.shiftKey) {
        e.preventDefault();
        send();
      }
    }

    function useSuggestion(text) {
      $input.value = text;
      $sendBtn.disabled = false;
      $input.focus();
      send();
    }

    function newChat() {
      messages = [];
      $messages.innerHTML = '';
      $messages.appendChild(createWelcome());
      $input.value = '';
      $sendBtn.disabled = true;
      isStreaming = false;
      abortController?.abort();
    }

    function createWelcome() {
      const div = document.createElement('div');
      div.className = 'welcome';
      div.id = 'welcome';
      div.innerHTML = `
        <div class="welcome-icon">🧠</div>
        <h2>Olá! Sou o VSAI - IA</h2>
        <p>Posso ajudar com perguntas, gerar código, traduzir textos, criar conteúdo, analisar dados e muito mais.</p>
        <div class="suggestions">
          <div class="suggestion" onclick="useSuggestion('Gere um código HTML de uma landing page moderna')">💻 Gerar código</div>
          <div class="suggestion" onclick="useSuggestion('Traduza este texto para inglês: Olá mundo')">🌍 Traduzir</div>
          <div class="suggestion" onclick="useSuggestion('Explique como funciona uma API REST')">📚 Explicar</div>
          <div class="suggestion" onclick="useSuggestion('Escreva um email profissional pedindo orçamento')">✉️ Escrever</div>
        </div>
      `;
      return div;
    }

    function parseMarkdown(text) {
      if (!text) return '';
      return text
        .replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;')
        .replace(/```(\w*)\n([\s\S]*?)```/g, '<pre><code class="lang-$1">$2</code></pre>')
        .replace(/`([^`]+)`/g, '<code>$1</code>')
        .replace(/^### (.+)$/gm, '<h3>$1</h3>')
        .replace(/^## (.+)$/gm, '<h2>$1</h2>')
        .replace(/^# (.+)$/gm, '<h1>$1</h1>')
        .replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>')
        .replace(/\*(.+?)\*/g, '<em>$1</em>')
        .replace(/\[([^\]]+)\]\(([^)]+)\)/g, '<a href="$2" target="_blank" rel="noopener">$1</a>')
        .replace(/^> (.+)$/gm, '<blockquote>$1</blockquote>')
        .replace(/^---$/gm, '<hr/>')
        .replace(/^- (.+)$/gm, '<li>$1</li>')
        .replace(/\n\n/g, '</p><p>')
        .replace(/\n/g, '<br/>');
    }

    function addMessage(role, content) {
      if ($welcome) $welcome.remove();
      const div = document.createElement('div');
      div.className = `msg msg-${role}`;
      const time = new Date().toLocaleTimeString('pt-BR');
      const label = role === 'user' ? '👤 Você' : role === 'ai' ? '🧠 VSAI - IA' : '⚠️ Sistema';
      div.innerHTML = `
        <div class="msg-bubble">${role === 'user' ? content : parseMarkdown(content)}</div>
        <div class="msg-meta"><span>${label}</span><span>•</span><span>${time}</span></div>
      `;
      $messages.appendChild(div);
      $messages.scrollTop = $messages.scrollHeight;
      return div;
    }

    function showStreaming() {
      const div = document.createElement('div');
      div.id = 'streamingMsg';
      div.className = 'msg msg-ai';
      div.innerHTML = '<div class="msg-bubble" id="streamContent"></div>';
      $messages.appendChild(div);
      $messages.scrollTop = $messages.scrollHeight;
    }

    function updateStream(text) {
      const el = document.getElementById('streamContent');
      if (el) {
        el.innerHTML = parseMarkdown(text);
        $messages.scrollTop = $messages.scrollHeight;
      }
    }

    function finalizeStream(content) {
      const el = document.getElementById('streamingMsg');
      if (el) el.remove();
      addMessage('ai', content);
      if (isCallMode || voiceEnabled) speak(content);
    }

    function speak(text) {
      if (!window.speechSynthesis) return;
      const clean = text.replace(/```[\s\S]*?```/g, '').replace(/[*#_~]/g, '');
      const utterance = new SpeechSynthesisUtterance(clean);
      utterance.lang = 'pt-BR';
      utterance.onend = () => {
        if (isCallMode) setTimeout(() => recognition?.start(), 500);
      };
      window.speechSynthesis.cancel();
      window.speechSynthesis.speak(utterance);
    }

    function toggleCallMode() {
      isCallMode = !isCallMode;
      const btn = document.getElementById('callBtn');
      btn.classList.toggle('active', isCallMode);
      if (isCallMode) {
        voiceEnabled = true;
        recognition?.start();
      } else {
        window.speechSynthesis.cancel();
      }
    }

    function toggleMic() {
      if (isRecording) recognition?.stop();
      else recognition?.start();
    }

    async function toggleCamera() {
      const preview = document.getElementById('cameraPreview');
      const video = document.getElementById('video');
      if (isCameraActive) {
        video.srcObject.getTracks().forEach(t => t.stop());
        preview.style.display = 'none';
        isCameraActive = false;
      } else {
        try {
          const stream = await navigator.mediaDevices.getUserMedia({ video: true });
          video.srcObject = stream;
          preview.style.display = 'block';
          isCameraActive = true;
        } catch (e) { alert('Erro ao abrir câmera'); }
      }
    }

    function captureFrame() {
      const video = document.getElementById('video');
      const canvas = document.createElement('canvas');
      canvas.width = video.videoWidth;
      canvas.height = video.videoHeight;
      canvas.getContext('2d').drawImage(video, 0, 0);
      imageAttachment = canvas.toDataURL('image/jpeg', 0.8);
      document.getElementById('imagePreview').style.display = 'block';
      document.getElementById('previewImg').src = imageAttachment;
    }

    function removeImage() {
      imageAttachment = null;
      document.getElementById('imagePreview').style.display = 'none';
    }

    async function send(overrideInput) {
      const content = overrideInput || $input.value.trim();
      if (!content && !imageAttachment) return;
      if (isStreaming) return;

      $input.value = '';
      $input.style.height = 'auto';
      $sendBtn.disabled = true;
      isStreaming = true;
      $sendBtn.innerHTML = '⏹';
      $sendBtn.className = 'send-btn abort';
      $sendBtn.disabled = false;
      $sendBtn.onclick = abort;

      const userPayload = imageAttachment 
        ? [{ type: 'image_url', image_url: { url: imageAttachment } }, { type: 'text', text: content || 'O que você vê?' }]
        : content;

      addMessage('user', content || '📷 Imagem enviada');
      messages.push({ role: 'user', content: userPayload });
      removeImage();

      showStreaming();

      abortController = new AbortController();
      let fullText = '';

      try {
        // Build headers with auth token
        const headers = { 'Content-Type': 'application/json' };
        try {
          const token = localStorage.getItem('nexus_access_token');
          if (token) headers['Authorization'] = `Bearer ${token}`;
        } catch (e) { /* no auth */ }

        const res = await fetch(`${API_BASE}/chat`, {
          method: 'POST',
          headers,
          signal: abortController.signal,
          body: JSON.stringify({
            content: typeof userPayload === 'string' ? userPayload : content,
            messages: messages.filter(m => m.role === 'user' || m.role === 'assistant').map(m => ({ role: m.role, content: m.content })),
            model: 'gemini-2.5-flash',
            provider: 'gemini',
          }),
        });

        if (!res.ok) {
          const errData = await res.json().catch(() => ({}));
          throw new Error(errData.error || errData.details || `HTTP ${res.status}`);
        }

        const reader = res.body.getReader();
        const decoder = new TextDecoder();
        let buffer = '';

        while (true) {
          const { done, value } = await reader.read();
          if (done) break;

          buffer += decoder.decode(value, { stream: true });
          const lines = buffer.split('\n');
          buffer = lines.pop() || '';

          for (const line of lines) {
            if (!line.startsWith('data: ')) continue;
            try {
              const msg = JSON.parse(line.slice(6));
              switch (msg.type) {
                case 'stream':
                  fullText += msg.text;
                  updateStream(fullText);
                  break;
                case 'assistant':
                  fullText = msg.content || fullText;
                  break;
                case 'done':
                  break;
                case 'error':
                  fullText += `\n\n> ❌ **Erro:** ${msg.message}`;
                  updateStream(fullText);
                  break;
              }
            } catch {}
          }
        }
      } catch (err) {
        if (err.name !== 'AbortError') {
          fullText += `\n\n> ❌ **Falha de Rede:** ${err.message}`;
        }
      }

      finalizeStream(fullText);
      messages.push({ role: 'assistant', content: fullText });

      isStreaming = false;
      $sendBtn.innerHTML = '➤';
      $sendBtn.className = 'send-btn';
      $sendBtn.disabled = true;
      $sendBtn.onclick = send;
      $input.focus();
    }

    function abort() {
      abortController?.abort();
      isStreaming = false;
      $sendBtn.innerHTML = '➤';
      $sendBtn.className = 'send-btn';
      $sendBtn.disabled = !$input.value.trim();
      $sendBtn.onclick = send;
    }

    $input.focus();
  </script>
</body>
</html>
